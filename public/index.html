<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#e50914">
    <title>MovieScraper - Tu Centro de Entretenimiento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Netflix Sans', 'Helvetica Neue', 'Segoe UI', Roboto, Arial, sans-serif;
            background: #141414;
            color: #fff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d2d2d;
        }
        ::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(10px);
            padding: 0 40px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-scrolled {
            background: #0a0a0a;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: #e5e5e5;
            text-decoration: none;
        }
        .hero {
            position: relative;
            height: 80vh;
            background: linear-gradient(77deg, rgba(0,0,0,.85) 0%, rgba(0,0,0,.4) 50%);
            display: flex;
            align-items: center;
            padding: 0 60px;
        }
        .hero-content {
            max-width: 600px;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .btn-primary, .btn-secondary {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #e50914;
            color: white;
        }
        .btn-secondary {
            background: rgba(109,109,110,0.7);
            color: white;
        }
        .search-section {
            padding: 30px 60px;
            background: #1a1a1a;
            margin: 20px 40px;
            border-radius: 12px;
        }
        .search-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #e50914;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-input, .search-select {
            flex: 1;
            padding: 15px 20px;
            background: #2a2a2a;
            color: white;
            border: none;
            border-radius: 8px;
        }
        .search-btn {
            padding: 15px 35px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .movie-card {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: #1a1a1a;
            transition: transform 0.3s;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
        }
        .movie-card .no-image {
            width: 100%;
            height: 270px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .movie-card h3 {
            padding: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
        }
        .modal-content {
            max-width: 1000px;
            margin: 40px auto;
            background: #141414;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container iframe {
            width: 100%;
            height: 56vh;
            border: none;
        }
        .modal-info {
            padding: 30px;
        }
        .servers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }
        .server-btn {
            padding: 10px 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .server-btn:hover {
            background: #e50914;
        }
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .no-results {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        .provider-section {
            margin-bottom: 40px;
        }
        .provider-title {
            font-size: 1.3rem;
            color: #e50914;
            margin-bottom: 15px;
        }
        .genres-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .genre-btn {
            padding: 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .genre-btn:hover {
            background: #e50914;
        }
        @media (max-width: 768px) {
            .search-section { padding: 20px; margin: 15px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <a href="#" class="logo">MOVIESCRAPER</a>
    <div class="nav-links">
        <a href="#" onclick="showHero()">Inicio</a>
        <a href="#" onclick="scrollToSearch()">Buscar</a>
        <a href="#" onclick="searchByTitle('popular')">Populares</a>
    </div>
</nav>

<div class="hero" id="heroSection">
    <div class="hero-content">
        <h1>Películas y Series Ilimitadas</h1>
        <p>Disfruta del mejor contenido desde múltiples fuentes.</p>
        <div class="hero-buttons">
            <button class="btn-primary" onclick="scrollToSearch()">Explorar Ahora</button>
            <button class="btn-secondary" onclick="searchByTitle('popular')">Populares</button>
        </div>
    </div>
</div>

<main>
    <div class="search-section" id="searchSection">
        <div class="search-tabs">
            <button class="tab-btn active" data-tab="title">🔍 Por Título</button>
            <button class="tab-btn" data-tab="person">🎭 Por Actor</button>
            <button class="tab-btn" data-tab="genre">🎬 Por Género</button>
            <button class="tab-btn" data-tab="providers">📡 Proveedores</button>
        </div>

        <div id="tab-title" class="tab-pane active">
            <div class="search-box">
                <input type="text" class="search-input" id="titleInput" placeholder="Título...">
                <input type="text" class="search-input" id="yearInput" placeholder="Año" style="flex:0.2">
                <select class="search-select" id="languageSelect">
                    <option value="es">Español</option>
                    <option value="en">Inglés</option>
                </select>
                <button class="search-btn" onclick="searchByTitle()">🔍 Buscar</button>
            </div>
            <div id="titleResults" class="movie-grid"></div>
        </div>

        <div id="tab-person" class="tab-pane">
            <div class="search-box">
                <input type="text" class="search-input" id="personInput" placeholder="Nombre del actor...">
                <button class="search-btn" onclick="searchByPerson()">🎭 Buscar</button>
            </div>
            <div id="personResults" class="movie-grid"></div>
        </div>

        <div id="tab-genre" class="tab-pane">
            <div class="genres-grid" id="genresGrid"></div>
            <div id="genreResults" class="movie-grid"></div>
        </div>

        <div id="tab-providers" class="tab-pane">
            <div class="search-box">
                <input type="text" class="search-input" id="directSearchInput" placeholder="Buscar...">
                <select class="search-select" id="providerSelect">
                    <option value="">Todos los proveedores</option>
                    <option value="serieskao">SeriesKao</option>
                </select>
                <button class="search-btn" onclick="searchDirect()">🔍 Buscar</button>
            </div>
            <div id="directResults"></div>
        </div>
    </div>
</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="modalBody"><div class="loading-spinner"></div></div>
    </div>
</div>

<script>
const API_URL = '/api/v1/movies';
const API_KEY = 'a7f3k9m2x8q4w1e6r5t0y9u4i7o2p1l3';

window.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    navbar.classList.toggle('navbar-scrolled', window.scrollY > 50);
});

function showHero() { document.getElementById('heroSection').scrollIntoView({ behavior: 'smooth' }); }
function scrollToSearch() { document.getElementById('searchSection').scrollIntoView({ behavior: 'smooth' }); }

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
    });
});

async function searchByTitle(preset) {
    let title = document.getElementById('titleInput').value.trim();
    if (preset === 'popular') title = 'popular';
    if (!title && preset !== 'popular') return alert('Ingresa un título');
    
    const resultsDiv = document.getElementById('titleResults');
    resultsDiv.innerHTML = '<div class="loading-spinner"></div>';
    
    try {
        let url = preset === 'popular' ? `${API_URL}/tmdb/search-by-genre?genreId=28` : `${API_URL}/tmdb/search?title=${encodeURIComponent(title)}`;
        const response = await fetch(`${url}&apiKey=${API_KEY}`);
        const data = await response.json();
        
        if (data.results?.length) displayMovieGrid(data.results, resultsDiv);
        else if (data.movie) displayMovieGrid([data.movie], resultsDiv);
        else resultsDiv.innerHTML = '<div class="no-results">😞 No se encontró la película</div>';
    } catch (error) {
        resultsDiv.innerHTML = '<div class="no-results">❌ Error en la búsqueda</div>';
    }
}

async function searchByPerson() {
    const name = document.getElementById('personInput').value.trim();
    if (!name) return alert('Ingresa un nombre');
    
    const resultsDiv = document.getElementById('personResults');
    resultsDiv.innerHTML = '<div class="loading-spinner"></div>';
    
    try {
        const response = await fetch(`${API_URL}/tmdb/search-by-person?name=${encodeURIComponent(name)}&apiKey=${API_KEY}`);
        const data = await response.json();
        if (data.movies?.length) displayMovieGrid(data.movies, resultsDiv);
        else resultsDiv.innerHTML = '<div class="no-results">😞 No se encontraron resultados</div>';
    } catch (error) {
        resultsDiv.innerHTML = '<div class="no-results">❌ Error</div>';
    }
}

async function loadGenres() {
    const grid = document.getElementById('genresGrid');
    try {
        const response = await fetch(`${API_URL}/tmdb/genres?apiKey=${API_KEY}`);
        const data = await response.json();
        if (data.genres) {
            grid.innerHTML = '';
            data.genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'genre-btn';
                btn.textContent = genre.name;
                btn.onclick = () => searchByGenre(genre.id);
                grid.appendChild(btn);
            });
        }
    } catch (error) {
        grid.innerHTML = '<div class="no-results">❌ Error cargando géneros</div>';
    }
}

async function searchByGenre(genreId) {
    const resultsDiv = document.getElementById('genreResults');
    resultsDiv.innerHTML = '<div class="loading-spinner"></div>';
    try {
        const response = await fetch(`${API_URL}/tmdb/search-by-genre?genreId=${genreId}&apiKey=${API_KEY}`);
        const data = await response.json();
        if (data.movies?.length) displayMovieGrid(data.movies, resultsDiv);
        else resultsDiv.innerHTML = '<div class="no-results">😞 No se encontraron películas</div>';
    } catch (error) {
        resultsDiv.innerHTML = '<div class="no-results">❌ Error</div>';
    }
}

async function searchDirect() {
    const query = document.getElementById('directSearchInput').value.trim();
    const provider = document.getElementById('providerSelect').value;
    if (!query) return alert('Ingresa un término');
    
    const resultsDiv = document.getElementById('directResults');
    resultsDiv.innerHTML = '<div class="loading-spinner"></div>';
    
    try {
        let url = `${API_URL}/search?q=${encodeURIComponent(query)}&apiKey=${API_KEY}`;
        if (provider) url += `&provider=${provider}`;
        const response = await fetch(url);
        const data = await response.json();
        displayProviderResults(data.results, resultsDiv);
    } catch (error) {
        resultsDiv.innerHTML = '<div class="no-results">❌ Error</div>';
    }
}

function displayMovieGrid(movies, container) {
    container.innerHTML = '';
    movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        const poster = movie.posterPath ? `https://image.tmdb.org/t/p/w500${movie.posterPath}` : (movie.thumbnail || null);
        card.innerHTML = `
            ${poster ? `<img src="${poster}" alt="${movie.title}">` : '<div class="no-image">🎬</div>'}
            <h3>${movie.title}</h3>
        `;
        card.onclick = () => playMovie(movie.url || `https://serieskao.top/pelicula/${movie.title.toLowerCase()}-vwSojy`, movie.title, 'serieskao');
        container.appendChild(card);
    });
}

function displayProviderResults(results, container) {
    container.innerHTML = '';
    for (const [provider, movies] of Object.entries(results)) {
        if (!movies?.length) continue;
        const section = document.createElement('div');
        section.className = 'provider-section';
        section.innerHTML = `<h3 class="provider-title">📺 ${provider.toUpperCase()}</h3>`;
        const grid = document.createElement('div');
        grid.className = 'movie-grid';
        movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<h3>${movie.title}</h3>`;
            card.onclick = () => playMovie(movie.url, movie.title, provider);
            grid.appendChild(card);
        });
        section.appendChild(grid);
        container.appendChild(section);
    }
}

async function playMovie(url, title, provider) {
    console.log('🎬 playMovie:', { url, title, provider });
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = '<div class="loading-spinner"></div>';
    modal.style.display = 'block';
    
    try {
        const response = await fetch(`${API_URL}/info?url=${encodeURIComponent(url)}&apiKey=${API_KEY}`);
        const result = await response.json();
        if (!result.data) throw new Error('No hay datos');
        
        const movie = result.data;
        modalBody.innerHTML = `
            <div class="video-container"><div id="playerFrame" style="height:56vh; background:#000; display:flex; align-items:center; justify-content:center; color:#888;">Selecciona un servidor</div></div>
            <div class="modal-info">
                <h2>${movie.title}</h2>
                <p>${movie.synopsis || ''}</p>
                <div class="servers-grid" id="serversGrid"></div>
            </div>
        `;
        const grid = document.getElementById('serversGrid');
        if (movie.downloadLinks?.length) {
            movie.downloadLinks.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.textContent = s.server;
                btn.onclick = () => {
                    const frame = document.getElementById('playerFrame');
                    frame.innerHTML = `<iframe src="${s.url}" frameborder="0" allowfullscreen style="width:100%; height:100%;"></iframe>`;
                };
                grid.appendChild(btn);
            });
        } else {
            grid.innerHTML = '<div class="no-results">⚠️ No hay servidores</div>';
        }
    } catch (error) {
        modalBody.innerHTML = `<div class="no-results">❌ Error: ${error.message}<br><button onclick="closeModal()">Cerrar</button></div>`;
    }
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

loadGenres();
document.getElementById('titleInput')?.addEventListener('keypress', e => e.key === 'Enter' && searchByTitle());
document.getElementById('directSearchInput')?.addEventListener('keypress', e => e.key === 'Enter' && searchDirect());
</script>
</body>
</html>
