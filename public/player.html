<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Películas - Movie Scraper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #e50914; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; font-size: 16px; border: none; border-radius: 8px; background: #2a2a3e; color: white; }
        input::placeholder { color: #888; }
        button { padding: 15px 30px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #f6121d; transform: translateY(-2px); transition: all 0.3s; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .movie-card { background: #2a2a3e; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
        .movie-card:hover { transform: translateY(-5px); }
        .movie-card img { width: 100%; height: 400px; object-fit: cover; }
        .movie-card h3 { padding: 15px; font-size: 16px; text-align: center; }
        .player-container { 
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            padding: 20px;
        }
        .player-container.active { display: block; }
        .close-player {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
            z-index: 1001;
        }
        iframe, video {
            width: 100%;
            height: 80vh;
            margin-top: 5vh;
            border: none;
            border-radius: 10px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #e50914;
        }
        .quality-badge {
            display: inline-block;
            background: #e50914;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        select {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            background: #2a2a3e;
            color: white;
            border: 1px solid #e50914;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Movie Scraper - Buscador de Películas</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar película... (ej: venom, batman, inception)">
            <select id="providerSelect">
                <option value="">Todos los proveedores</option>
                <option value="estrenoscinesaa">EstrenosCinesaa</option>
                <option value="repelishd">RePelisHD</option>
            </select>
            <button onclick="searchMovies()">🔍 Buscar</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>
    
    <div id="playerContainer" class="player-container">
        <span class="close-player" onclick="closePlayer()">&times;</span>
        <iframe id="player" src=""></iframe>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3001/api/v1/movies';
        
        async function searchMovies() {
            const query = document.getElementById('searchInput').value;
            const provider = document.getElementById('providerSelect').value;
            
            if (!query) {
                alert('Ingresa un término de búsqueda');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🔍 Buscando películas...</div>';
            
            try {
                let url = `${API_URL}/search-and-resolve?q=${encodeURIComponent(query)}`;
                if (provider) url += `&provider=${provider}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                displayResults(data.results);
            } catch (error) {
                resultsDiv.innerHTML = '<div class="loading">❌ Error en la búsqueda</div>';
                console.error(error);
            }
        }
        
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            let total = 0;
            for (const provider in results) {
                total += results[provider].length;
            }
            
            if (total === 0) {
                resultsDiv.innerHTML = '<div class="loading">😞 No se encontraron películas</div>';
                return;
            }
            
            for (const [provider, movies] of Object.entries(results)) {
                if (movies.length === 0) continue;
                
                const providerSection = document.createElement('div');
                providerSection.innerHTML = `<h2 style="margin-top: 30px;">📺 ${provider.toUpperCase()}</h2>`;
                resultsDiv.appendChild(providerSection);
                
                const grid = document.createElement('div');
                grid.className = 'results';
                
                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    
                    const thumbnail = movie.thumbnail && !movie.thumbnail.includes('themoviedb') 
                        ? movie.thumbnail 
                        : 'https://via.placeholder.com/300x400?text=No+Image';
                    
                    card.innerHTML = `
                        <img src="${thumbnail}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x400?text=${encodeURIComponent(movie.title)}'">
                        <h3>
                            ${movie.title}
                            ${movie.quality ? `<span class="quality-badge">${movie.quality}</span>` : ''}
                            ${movie.size ? `<span style="font-size: 11px; display: block; color: #888;">${movie.size}</span>` : ''}
                        </h3>
                    `;
                    
                    card.onclick = () => playMovie(movie);
                    grid.appendChild(card);
                });
                
                resultsDiv.appendChild(grid);
            }
        }
        
        function playMovie(movie) {
            const playerContainer = document.getElementById('playerContainer');
            const player = document.getElementById('player');
            
            let streamUrl = movie.streamUrl;
            
            // Si es TMDB, buscar enlace real
            if (streamUrl && streamUrl.includes('themoviedb.org')) {
                alert('Esta película no tiene enlace de video disponible');
                return;
            }
            
            if (!streamUrl || streamUrl === 'chrome-error://chromewebdata/') {
                alert('No hay URL de stream disponible para esta película');
                return;
            }
            
            // Configurar reproductor según el tipo de URL
            if (streamUrl.includes('drop.download')) {
                // Abrir en nueva ventana para drop.download
                window.open(streamUrl, '_blank');
                alert('🔓 El enlace se abrirá en una nueva pestaña\n\nHaz clic en el botón de reproducción para ver la película');
                return;
            } else if (streamUrl.includes('uptobox') || streamUrl.includes('upstream')) {
                // Estos servicios requieren interacción manual
                window.open(streamUrl, '_blank');
                alert('📥 El enlace se abrirá en una nueva pestaña\n\nSigue las instrucciones para ver la película');
                return;
            } else if (streamUrl.match(/\.(mp4|mkv|webm)$/i)) {
                // Video directo
                playerContainer.classList.add('active');
                player.src = streamUrl;
            } else {
                // Intentar como iframe
                playerContainer.classList.add('active');
                player.src = streamUrl;
            }
        }
        
        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const player = document.getElementById('player');
            playerContainer.classList.remove('active');
            player.src = '';
        }
        
        // Buscar al presionar Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMovies();
        });
        
        // Búsqueda inicial con venom
        setTimeout(() => {
            document.getElementById('searchInput').value = 'venom';
            searchMovies();
        }, 500);
    </script>
</body>
</html>
